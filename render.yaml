# Render Blueprint — Free-tier quick-path deploy for Headline Under The Hood
# https://render.com/docs/blueprint-spec
#
# Creates a single Web Service on the free plan. NO persistent disk because
# Render's free tier doesn't support disks — that means the SQLite database
# and raw release-text files are EPHEMERAL: every cold-start (after 15 min of
# inactivity) or deploy gives you a fresh, empty database. Re-click "Seed
# examples" in the dashboard to repopulate.
#
# When you outgrow this, change `plan: free` to `plan: starter` ($7/mo,
# always-on), uncomment the `disk:` block below to add 1 GB persistent
# storage, and switch DATABASE_PATH + STORAGE_ROOT to /var/data/* values.
# A `git push` after that swap auto-deploys the upgraded service.

services:
  - type: web
    name: headline-under-the-hood
    runtime: python
    plan: free               # sleeps after 15 min idle, ephemeral filesystem
    region: oregon           # change to your nearest region if you like
    branch: main
    rootDir: .

    # --- Build & run ------------------------------------------------------
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT

    # --- Health & traffic -------------------------------------------------
    healthCheckPath: /api/reports
    autoDeploy: true         # push to main = auto-deploy

    # --- Persistent storage (disabled on free plan) -----------------------
    # Uncomment the disk block below after upgrading to plan: starter.
    # disk:
    #   name: app-data
    #   mountPath: /var/data
    #   sizeGB: 1

    # --- Environment ------------------------------------------------------
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: APP_NAME
        value: Headline Under The Hood
      # Ephemeral paths under /tmp because the free tier has no persistent
      # disk. Each restart starts with an empty database.
      - key: DATABASE_PATH
        value: /tmp/data/app.db
      - key: STORAGE_ROOT
        value: /tmp/data/storage
      - key: USE_TEMPORAL
        value: "false"
      # --- Secrets (set in the dashboard, do not commit values) ----------
      - key: GEMINI_API_KEY
        sync: false          # prompts you for the value when the blueprint runs
      - key: GEMINI_MODEL
        value: gemini-2.5-flash-lite
